name: Update dchp submodule

on:
  workflow_dispatch:
  #schedule:
  #  - cron: '0 6 * * *'
  

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update submodule to upstream latest
        id: update
        run: |
          git submodule update --remote --recursive
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No submodule changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git -C dchp rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update dchp submodule to ${{ steps.update.outputs.sha }}"
          branch: update-dchp-submodule
          delete-branch: true
          title: "Update dchp submodule to ${{ steps.update.outputs.sha }}"
          body: |
            Automated update of the `dchp` submodule to the latest upstream `main`
            (`openid/dchp@${{ steps.update.outputs.sha }}`).

            Merging this triggers the container build & push workflow.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
